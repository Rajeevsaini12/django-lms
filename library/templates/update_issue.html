{% extends "library/base.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4 class="mb-0">Update Issue Record</h4>
</div>

<div class="card-body">

<div class="mb-3">
<strong>Book:</strong> {{ record.book.title }} <br>
<strong>Member:</strong> {{ record.member.user.username }}
</div>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Issue Date</label>
<input type="date"
       name="issue_date"
       class="form-control"
       value="{{ record.issue_date|date:'Y-m-d' }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Due Date</label>
<input type="date"
       name="due_date"
       class="form-control"
       value="{{ record.due_date|date:'Y-m-d' }}"
       required>
</div>

<div class="d-flex justify-content-between">

<a href="{% url 'dashboard' %}" class="btn btn-secondary">
Cancel
</a>

<button type="submit" class="btn btn-success">
Update Record
</button>

</div>

</form>

</div>

</div>

</div>
</div>

</div>

{% endblock %}
