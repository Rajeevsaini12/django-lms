{% extends "library/base.html" %}
{% block content %}

<div class="container mt-4">

<h2>Books</h2>

<form method="GET">
    <input type="text" name="q" placeholder="Search book" value="{{ request.GET.q }}">
    <button type="submit">Search</button>
</form>

<br>

<table class="table table-bordered table-striped">
<thead>
<tr>
    <th>Title</th>
    <th>Author</th>
    <th>ISBN</th>
    <th>Available</th>
</tr>
</thead>

<tbody>

{% for book in books %}
<tr>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.isbn }}</td>
    <td>{{ book.available_copies }}</td>
</tr>
{% empty %}
<tr>
<td colspan="4">No Books Found</td>
</tr>
{% endfor %}

</tbody>
</table>

</div>

{% endblock %}
